server {
    listen       ${PORT};
    server_name  _;

    root   /usr/share/nginx/html;
    index  index.html;

    # Long-cache hashed assets emitted by Vite
    location /assets/ {
        access_log off;
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    # SPA: fall back to index.html so React Router handles unknown paths
    location / {
        try_files $uri $uri/ /index.html;
    }
}
